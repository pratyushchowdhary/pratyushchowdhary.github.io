<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>Projects</title>
    <style>
      :root {
        --bg: #111111;
        --fg: #f0e85a;
        --link: #9b6cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: "Courier New", Courier, monospace;
        transition: background .2s ease, color .2s ease;
      }
      body.light {
        --bg: #fff200;
        --fg: #111111;
        --link: #7b34ff;
      }
      main {
        min-height: 100vh;
        padding: 28px;
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 36px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 400;
      }
      button {
        border: 0;
        background: transparent;
        color: var(--fg);
        font: inherit;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
      }
      .list {
        margin: 0;
        max-width: 820px;
        display: grid;
        gap: 10px;
        font-size: 18px;
        line-height: 1.6;
      }
      a {
        color: var(--fg);
        text-decoration: none;
      }
      a:hover, a:focus-visible { text-decoration: underline; }
      .tag { color: var(--link); }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <h1>Projects</h1>
        <button id="toggle" type="button" aria-label="Toggle background">[sun/moon]</button>
      </div>
      <div class="list">
        <div><a href="https://pratyushchowdhary.github.io/schrodinger-cat-paradox/">[Schrödinger Cat Paradox]</a> <span class="tag">/ quantum game</span></div>
        <div><a href="https://pratyushchowdhary.github.io/point-games/">[Point Games]</a> <span class="tag">/ snake game</span></div>
        <div><a href="https://pratyushchowdhary.github.io/MiningMap/">[MiningMap]</a> <span class="tag">/ material map</span></div>
        <div><a href="https://pratyushchowdhary.github.io/Supplier-Onboarding-Compliance-/">[Supply NOW]</a> <span class="tag">/ supplier portal</span></div>
      </div>
    </main>
    <script>
      document.getElementById('toggle').addEventListener('click', () => {
        document.body.classList.toggle('light');
      });
    </script>
  </body>
</html>
