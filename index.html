<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>All Projects</title>
    <style>
      :root {
        --bg: #fff200;
        --fg: #111111;
        --line: #111111;
        --card: #fff200;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: Arial, Helvetica, sans-serif;
        transition: background .2s ease, color .2s ease;
      }
      body.dark {
        --bg: #111111;
        --fg: #fff200;
        --line: #fff200;
        --card: #111111;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .box {
        width: min(420px, 100%);
        border: 2px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 6px 6px 0 var(--line);
        background: var(--card);
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      button {
        border: 2px solid var(--line);
        background: transparent;
        color: var(--fg);
        border-radius: 999px;
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }
      .face {
        font-size: 34px;
        line-height: 1;
        margin: 8px 0 14px;
      }
      .links {
        display: grid;
        gap: 10px;
      }
      a {
        display: block;
        border: 2px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        color: var(--fg);
        text-decoration: none;
        box-shadow: 3px 3px 0 var(--line);
      }
      a:hover, a:focus-visible {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 var(--line);
        outline: none;
      }
      small { display: block; opacity: .75; margin-top: 4px; }
    </style>
  </head>
  <body>
    <main>
      <section class="box" aria-label="Project links">
        <div class="top">
          <h1>All Projects</h1>
          <button id="toggle" type="button" aria-label="Toggle background">☀ / ☾</button>
        </div>
        <div class="face" aria-hidden="true">:)</div>
        <nav class="links">
          <a href="https://www.linkedin.com/in/pratyushchowdhary/">LinkedIn<small>profile</small></a>
          <a href="https://en.wikipedia.org/wiki/User:Pratyush_Chowdhary">Wiki<small>user page</small></a>
          <a href="https://pratyushchowdhary.github.io/schrodinger-cat-paradox/">Schrödinger Cat Paradox<small>quantum game</small></a>
          <a href="https://pratyushchowdhary.github.io/point-games/">Point Games<small>snake game</small></a>
          <a href="https://pratyushchowdhary.github.io/MiningMap/">MiningMap<small>material map</small></a>
          <a href="https://pratyushchowdhary.github.io/Supplier-Onboarding-Compliance-/">Supply NOW<small>supplier portal</small></a>
        </nav>
      </section>
    </main>
    <script>
      const btn = document.getElementById('toggle');
      btn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
      });
    </script>
  </body>
</html>
